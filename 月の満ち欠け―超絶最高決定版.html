<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>【最終完全融合版】月の満ち欠けシミュレーター</title>
    <style>
        body {
            background-color: #0d1b2a;
            color: #fff;
            text-align: center;
            font-family: 'Hiragino Kaku Gothic Pro', 'メイリオ', sans-serif;
            padding: 20px;
            transition: background-color 0.5s;
        }
        h2 { color: #fdfd96; margin-bottom: 5px;}
        h4 { color: #a0c4ff; margin-top: 0; margin-bottom: 20px; }
        
        /* モード切り替えスイッチ */
        .mode-switch {
            display: inline-flex;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 5px;
            margin-bottom: 10px;
        }
        .mode-btn {
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            color: #ccc;
        }
        .mode-btn.active {
            background-color: #fdfd96;
            color: #0d1b2a;
        }

        canvas {
            background-color: #1a2634;
            border-radius: 50%;
            margin: 20px auto;
            display: block;
            box-shadow: 0 0 25px rgba(253, 253, 150, 0.4);
            transition: background-color 0.5s;
        }

        .controls {
            margin-top: 15px;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 10px;
            display: inline-block;
            width: 80%;
            max-width: 500px;
        }
        .slider-group {
            margin: 15px 0;
            text-align: left;
            transition: opacity 0.3s;
        }
        .slider-group.disabled {
            opacity: 0.3;
            pointer-events: none; /* クリックやスライドを無効化 */
        }
        label {
            display: block;
            font-weight: bold;
            color: #a0c4ff;
            margin-bottom: 5px;
        }
        .time-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #ccc;
            margin-top: 4px;
        }
        input[type="range"] {
            width: 100%;
            height: 10px;
            accent-color: #fdfd96;
        }
        .info {
            font-size: 1.6rem;
            font-weight: bold;
            color: #fdfd96;
            margin: 10px 0;
        }
        .day-display {
            font-size: 1.2rem;
            color: #fff;
        }
    </style>
</head>
<body>

    <h2>🌙 月の満ち欠け ＆ 回転シミュレーター ☀️</h2>
    <h4>〜 物理的ルールから実際の夜空の見え方まで 〜</h4>
    
    <!-- モード切り替えボタン -->
    <div class="mode-switch">
        <div id="btn1" class="mode-btn active" onclick="setMode(1)">① きほんの形</div>
        <div id="btn2" class="mode-btn" onclick="setMode(2)">② じっさいの見え方</div>
    </div>

    <canvas id="moonCanvas" width="200" height="200"></canvas>

    <div class="info" id="moonName">新月</div>
    <div class="day-display">
        <span id="dayValue">0.0</span> 日ごろ ｜ 
        <span id="timeValue">0</span> 時ごろ ｜ 
        <span id="dirValue" style="color:#ffd166;">南の空（南中）</span>
    </div>

    <!-- 操作パネル -->
    <div class="controls">
        
        <!-- スライダー1：月齢 -->
        <div class="slider-group">
            <label>月齢をえらぶ (形の変化)</label>
            <input type="range" id="ageSlider" min="0" max="30" value="15" step="0.1" oninput="updateAll()">
            <div class="time-labels">
                <span>0 (新月)</span>
                <span>15 (満月)</span>
                <span>30 (新月)</span>
            </div>
        </div>

        <!-- スライダー2：時刻 -->
        <div class="slider-group" id="timeSliderGroup">
            <label>じこくをえらぶ (回転の変化)</label>
            <input type="range" id="timeSlider" min="12" max="36" value="24" step="1" oninput="updateAll()">
            <div class="time-labels">
                <span>昼 12時</span>
                <span>夕方 18時</span>
                <span>★真夜中 0時</span>
                <span>朝 6時</span>
                <span>昼 12時</span>
            </div>
        </div>
        
    </div>
    
    <p style="margin-top: 15px; color: #ccc; font-size: 0.9rem;" id="helpText">
        ※「きほんの形」モードでは、月齢による純粋な満ち欠けの形を学習できます。
    </p>

    <script>
        let currentMode = 1; // 1: 正立モード, 2: 回転モード

        function setMode(mode) {
            currentMode = mode;
            
            // ボタンのアクティブ状態の切り替え
            document.getElementById('btn1').classList.toggle('active', mode === 1);
            document.getElementById('btn2').classList.toggle('active', mode === 2);
            
            // 時刻スライダーの有効・無効化
            const timeGroup = document.getElementById('timeSliderGroup');
            const helpText = document.getElementById('helpText');
            
            if (mode === 1) {
                timeGroup.classList.add('disabled');
                helpText.innerText = "※「きほんの形」モードでは、月齢による純粋な満ち欠けの形を学習できます。";
            } else {
                timeGroup.classList.remove('disabled');
                helpText.innerText = "※「じっさいの見え方」モードでは、時間とともに月がゴロゴロと回転して沈む様子がわかります。";
            }
            
            updateAll();
        }

        function updateAll() {
            const age = parseFloat(document.getElementById('ageSlider').value);
            const sliderValue = parseFloat(document.getElementById('timeSlider').value);
            const time = sliderValue % 24;
            
            document.getElementById('dayValue').innerText = age.toFixed(1);
            document.getElementById('timeValue').innerText = time;
            
            updateName(age);
            
            const transitTime = (12 + (age * 24 / 30)) % 24;
            let hourDiff = time - transitTime;
            if (hourDiff > 12) hourDiff -= 24;
            if (hourDiff < -12) hourDiff += 24;
            
            // 【モードによる分岐】
            // モード1のときは回転角を強制的に 0（正立）にします
            const rotateAngle = (currentMode === 1) ? 0 : (hourDiff * 15) * Math.PI / 180;
            
            const dirText = document.getElementById('dirValue');
            let isVisible = true;
            
            if (currentMode === 1) {
                dirText.innerText = "正面から見た形";
                dirText.style.color = "#a0c4ff";
            } else {
                if (Math.abs(hourDiff) <= 1) {
                    dirText.innerText = "南の空（南中）";
                    dirText.style.color = "#ffd166";
                } else if (hourDiff < -1 && hourDiff >= -6) {
                    dirText.innerText = "東の空（のぼってくる）";
                    dirText.style.color = "#06d6a0";
                } else if (hourDiff > 1 && hourDiff <= 6) {
                    dirText.innerText = "西の空（しずんでいく）";
                    dirText.style.color = "#118ab2";
                } else {
                    dirText.innerText = "地平線の下（見えません）";
                    dirText.style.color = "#ef476f";
                    isVisible = false;
                }
            }

            // 背景色の変化（モード1は常に夜空、モード2は時刻連動）
            if (currentMode === 1) {
                document.body.style.backgroundColor = "#0d1b2a";
            } else {
                if (time >= 5 && time < 7) {
                    document.body.style.backgroundColor = "#ff7b00";
                } else if (time >= 7 && time < 17) {
                    document.body.style.backgroundColor = "#4cc9f0";
                } else if (time >= 17 && time < 19) {
                    document.body.style.backgroundColor = "#b5179e";
                } else {
                    document.body.style.backgroundColor = "#0d1b2a";
                }
            }

            drawMoon(age, rotateAngle, isVisible, time);
        }

        function drawMoon(age, rotateAngle, isVisible, time) {
            const canvas = document.getElementById('moonCanvas');
            const ctx = canvas.getContext('2d');
            
            const centerX = 100;
            const centerY = 100;
            const radius = 80;

            const skyColor = window.getComputedStyle(document.body).backgroundColor;
            canvas.style.backgroundColor = skyColor;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // モード1の時は常に100%の濃さで表示
            ctx.globalAlpha = (currentMode === 1 || isVisible) ? 1.0 : 0.2;

            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
            
            if (currentMode === 2 && time >= 7 && time < 17) {
                ctx.fillStyle = "rgba(255, 255, 255, 0.2)";
            } else {
                ctx.fillStyle = "rgba(255, 255, 255, 0.05)";
            }
            ctx.fill();

            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.rotate(rotateAngle);
            ctx.translate(-centerX, -centerY);

            const angle = (age / 30) * 2 * Math.PI + Math.PI;
            const k = Math.cos(angle);

            ctx.beginPath();
            if (age <= 15) {
                ctx.arc(centerX, centerY, radius, -Math.PI / 2, Math.PI / 2, false);
                ctx.ellipse(centerX, centerY, radius * Math.abs(k), radius, 0, Math.PI / 2, -Math.PI / 2, k < 0);
            } else {
                ctx.arc(centerX, centerY, radius, Math.PI / 2, -Math.PI / 2, false);
                ctx.ellipse(centerX, centerY, radius * Math.abs(k), radius, 0, -Math.PI / 2, Math.PI / 2, k < 0);
            }
            ctx.closePath();
            
            ctx.fillStyle = "#fdfd96";
            ctx.fill();

            ctx.restore();
            ctx.globalAlpha = 1.0;
        }

        function updateName(age) {
            const nameText = document.getElementById('moonName');
            if (age < 1 || age >= 29.5) nameText.innerText = "新月 (しんげつ)";
            else if (age >= 1 && age < 3) nameText.innerText = "繊月 (せんげつ)";
            else if (age >= 3 && age < 6.5) nameText.innerText = "三日月 (みかづき)";
            else if (age >= 6.5 && age < 8.5) nameText.innerText = "上弦の月 (じょうげんのつき)";
            else if (age >= 8.5 && age < 14) nameText.innerText = "十三夜 (じゅうさんや)";
            else if (age >= 14 && age < 16) nameText.innerText = "満月 (まんげつ)";
            else if (age >= 16 && age < 22) nameText.innerText = "十六夜・立待月など";
            else if (age >= 22 && age < 23.5) nameText.innerText = "下弦の月 (かげんのつき)";
            else if (age >= 23.5 && age < 28) nameText.innerText = "二十六夜 (にじゅうろくや)";
            else nameText.innerText = "明けの三日月";
        }

        // 初期化
        setMode(1);
    </script>
</body>
</html>
